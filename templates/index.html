<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Predictor - 4Geeks</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #4e73df; border: none; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4">
                    <h2 class="text-center mb-4">Análisis de Riesgo de Diabetes</h2>
                    <p class="text-muted text-center">Ingresa los datos del paciente para obtener una predicción basada en el modelo Pima Indians.</p>
                    
                    <form action="/predict" method="post" class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Embarazos</label>
                            <input type="number" name="pregnancies" class="form-control" placeholder="Ej: 2" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Glucosa (mg/dL)</label>
                            <input type="number" name="glucose" class="form-control" placeholder="Ej: 120" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Presión Arterial (mm Hg)</label>
                            <input type="number" name="blood_pressure" class="form-control" placeholder="Ej: 80" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Grosor de Piel (mm)</label>
                            <input type="number" name="skin_thickness" class="form-control" placeholder="Ej: 20" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Insulina (mu U/ml)</label>
                            <input type="number" name="insulin" class="form-control" placeholder="Ej: 85" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Índice de Masa Corporal (BMI)</label>
                            <input type="number" step="0.1" name="bmi" class="form-control" placeholder="Ej: 26.5" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Función Pedigrí (DPF)</label>
                            <input type="number" step="0.001" name="dpf" class="form-control" placeholder="Ej: 0.47" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Edad</label>
                            <input type="number" name="age" class="form-control" placeholder="Ej: 33" required>
                        </div>
                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-primary w-100 p-2">Realizar Predicción</button>
                        </div>
                    </form>

                    {% if prediction_text %}
                    <div class="alert alert-{{ alert_class }} mt-4 text-center" role="alert">
                        <h4>Resultado: {{ prediction_text }}</h4>
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
